<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:800px; height:480px; overflow:hidden; background:#111; font-family:sans-serif; }
#bg-blur { position:absolute; inset:0; background:url('https://upload.wikimedia.org/wikipedia/commons/4/40/Gono-Line_GV-E402-20.jpg') center/cover; filter:blur(18px); opacity:0.35; z-index:0; }
#bg-wrap { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:1; }
#bg-wrap img { max-width:100%; max-height:100%; object-fit:contain; }
#overlay { position:absolute; bottom:0; left:0; right:0; padding:50px 20px 14px; background:linear-gradient(transparent,rgba(0,0,0,0.88)); color:white; z-index:2; text-shadow:0 1px 6px rgba(0,0,0,0.9),0 0 12px rgba(0,0,0,0.7); }
#title { font-size:20px; font-weight:bold; margin-bottom:4px; }
#desc { font-size:13px; opacity:0.85; line-height:1.7; margin-bottom:6px; }
#trivia { font-size:13px; opacity:1; line-height:1.6; border-top:0.5px solid rgba(255,255,255,0.8); padding-top:6px; margin-top:4px; }
</style>
</head>
<body>
<div id="bg-blur"></div>
<div id="bg-wrap"><img src="https://upload.wikimedia.org/wikipedia/commons/4/40/Gono-Line_GV-E402-20.jpg"></div>
<div id="overlay">
  <div id="title">岩木山をバックに走る五能線普通列車</div>
  <div id="desc">岩木山をバックに走る五能線普通列車</div>
  <div id="trivia">奥羽本線（おううほんせん）は、福島県福島市の福島駅から、東北地方の山間部を縦貫し、山形県・秋田県を経由して青森県青森市の青森駅に至る鉄道路線（幹線）である。
一部区間ではミニ新幹線として東北新幹線との直通運転が行われており、福島駅 - 新庄駅間には山形新幹線「つばさ」が、大曲駅 - 秋田駅間には秋田新幹線「こまち」が運転されている。このうち福島駅 - 新庄駅間には山形線（やまがたせん）の愛称がつけられている。
路線名称の由来については、「奥羽」を参照。</div>
</div>
</body>
</html>
