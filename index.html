<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:800px; height:480px; overflow:hidden; background:#111; font-family:sans-serif; }
#bg-wrap { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:#111; }
#bg-wrap img { max-width:100%; max-height:100%; object-fit:contain; }
#bg-blur { position:absolute; inset:0; background:url('https://upload.wikimedia.org/wikipedia/commons/6/6e/Maria_Tudor1.jpg') center/cover; filter:blur(18px); opacity:0.35; z-index:0; }
#bg-wrap { z-index:1; }
#overlay { position:absolute; bottom:0; left:0; right:0; padding:50px 20px 14px; background:linear-gradient(transparent,rgba(0,0,0,0.88)); color:white; z-index:2; }
#title { font-size:20px; font-weight:bold; margin-bottom:4px; }
#artist { font-size:12px; opacity:0.75; margin-bottom:8px; }
#desc { font-size:13px; opacity:0.85; line-height:1.7; }
</style>
</head>
<body>
<div id="bg-blur"></div>
<div id="bg-wrap"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Maria_Tudor1.jpg"></div>
<div id="overlay">
  <div id="title">メアリー・チューダー<b><a href="//commons.wikimedia.org/wiki/Mary_I_of_England" title="Mary I of England">女王、イングランド</a>女王、フィリップ2世の2番目の妻</b>。</div>
  <div id="artist">Antonis Mor</div>
  <div id="desc">イングランドのメアリー1世女王の肖像、アントニス・モール、1554年。</div>
</div>
</body>
</html>
