<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:800px; height:480px; overflow:hidden; background:#111; font-family:sans-serif; }
#bg-blur { position:absolute; inset:0; background:url('https://upload.wikimedia.org/wikipedia/commons/1/16/Kei_Nishikori_1%2C_Wimbledon_2013_-_Diliff.jpg') center/cover; filter:blur(18px); opacity:0.35; z-index:0; }
#bg-wrap { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:1; }
#bg-wrap img { max-width:100%; max-height:100%; object-fit:contain; }
#overlay { position:absolute; bottom:0; left:0; right:0; padding:50px 20px 14px; background:linear-gradient(transparent,rgba(0,0,0,0.88)); color:white; z-index:2; text-shadow:0 1px 6px rgba(0,0,0,0.9),0 0 12px rgba(0,0,0,0.7); }
#title { font-size:20px; font-weight:bold; margin-bottom:4px; }
#desc { font-size:13px; opacity:0.85; line-height:1.7; margin-bottom:6px; }
#trivia { font-size:13px; opacity:1; line-height:1.6; border-top:0.5px solid rgba(255,255,255,0.8); padding-top:6px; margin-top:4px; }
</style>
</head>
<body>
<div id="bg-blur"></div>
<div id="bg-wrap"><img src="https://upload.wikimedia.org/wikipedia/commons/1/16/Kei_Nishikori_1%2C_Wimbledon_2013_-_Diliff.jpg"></div>
<div id="overlay">
  <div id="title">錦織圭</div>
  <div id="desc">錦織圭</div>
  <div id="trivia">錦織 圭（にしこり けい、1989年〈平成元年〉12月29日 - ）は、島根県松江市出身の男子プロテニス選手。松江市立乃木小学校、開星中学校、青森山田高校卒業。ATPランキング自己最高位はシングルス4位、ダブルス167位。ATPツアーでシングルス12勝。身長178cm、体重73kg。右利き、バックハンド・ストロークは両手打ち。
アジア男子史上初のグランドスラムシングルスファイナリスト。2016年リオデジャネイロオリンピック銅メダリスト。</div>
</div>
</body>
</html>
