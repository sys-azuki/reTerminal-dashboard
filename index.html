<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:800px; height:480px; overflow:hidden; background:#111; font-family:sans-serif; }
#bg-blur { position:absolute; inset:0; background:url('https://upload.wikimedia.org/wikipedia/commons/e/e4/Osaka_Castle_02bs3200.jpg') center/cover; filter:blur(18px); opacity:0.35; z-index:0; }
#bg-wrap { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:1; }
#bg-wrap img { max-width:100%; max-height:100%; object-fit:contain; }
#overlay { position:absolute; bottom:0; left:0; right:0; padding:50px 20px 14px; background:linear-gradient(transparent,rgba(0,0,0,0.88)); color:white; z-index:2; text-shadow:0 1px 6px rgba(0,0,0,0.9),0 0 12px rgba(0,0,0,0.7); }
#title { font-size:20px; font-weight:bold; margin-bottom:4px; }
#desc { font-size:13px; opacity:0.85; line-height:1.7; margin-bottom:6px; }
#trivia { font-size:13px; opacity:1; line-height:1.6; border-top:0.5px solid rgba(255,255,255,0.8); padding-top:6px; margin-top:4px; }
</style>
</head>
<body>
<div id="bg-blur"></div>
<div id="bg-wrap"><img src="https://upload.wikimedia.org/wikipedia/commons/e/e4/Osaka_Castle_02bs3200.jpg"></div>
<div id="overlay">
  <div id="title">大阪城の全景、大阪府大阪市</div>
  <div id="desc">大阪城の全景、大阪府大阪市</div>
  <div id="trivia">大坂城または大阪城（おおさかじょう）は、現在の大阪府大阪市中央区大阪城（上町台地の先端、摂津国東成郡生玉荘大坂）にあった、安土桃山時代に築かれ、江戸時代に再築された日本の城。別称は錦城（きんじょう、金城とも表記）。
「大阪城跡」として国の特別史跡に指定されている。なお、城址を含む一帯は大阪城公園（おおさかじょうこうえん）として整備されている。1931年に復興された天守は博物館「大阪城天守閣」となっている。</div>
</div>
</body>
</html>
