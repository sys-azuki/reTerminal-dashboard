<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:800px; height:480px; overflow:hidden; background:#111; font-family:sans-serif; }
#bg-blur { position:absolute; inset:0; background:url('https://upload.wikimedia.org/wikipedia/commons/6/67/Kansetsu_Hashimoto_-_Old_Monkey_with_Cherry_in_Autumn_-_Google_Art_Project.jpg') center/cover; filter:blur(18px); opacity:0.35; z-index:0; }
#bg-wrap { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:1; }
#bg-wrap img { max-width:100%; max-height:100%; object-fit:contain; }
#overlay { position:absolute; bottom:0; left:0; right:0; padding:50px 20px 14px; background:linear-gradient(transparent,rgba(0,0,0,0.88)); color:white; z-index:2; text-shadow:0 1px 6px rgba(0,0,0,0.9),0 0 12px rgba(0,0,0,0.7); }
#title { font-size:20px; font-weight:bold; margin-bottom:4px; }
#desc { font-size:13px; opacity:0.85; line-height:1.7; margin-bottom:6px; }
#trivia { font-size:13px; opacity:1; line-height:1.6; border-top:0.5px solid rgba(255,255,255,0.8); padding-top:6px; margin-top:4px; }
</style>
</head>
<body>
<div id="bg-blur"></div>
<div id="bg-wrap"><img src="https://upload.wikimedia.org/wikipedia/commons/6/67/Kansetsu_Hashimoto_-_Old_Monkey_with_Cherry_in_Autumn_-_Google_Art_Project.jpg"></div>
<div id="overlay">
  <div id="title">橋本関雪の日本画『秋桜老猿』</div>
  <div id="desc">橋本関雪の日本画『秋桜老猿』</div>
  <div id="trivia">橋本 関雪（はしもと かんせつ、1883年〈明治16年〉11月10日 - 1945年〈昭和20年〉2月26日）は、日本画家。本名は貫一。中国の古典文学や風物を題材にした作品や、「新南画」と呼ばれる作風を確立した。建築や造園にも造詣が深く、明石市東二見町の「蟹紅鱸白荘」（現白沙荘）を初め3棟の別荘を建てた。</div>
</div>
</body>
</html>
