<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:800px; height:480px; overflow:hidden; background:#111; font-family:sans-serif; }
#bg-blur { position:absolute; inset:0; background:url('https://upload.wikimedia.org/wikipedia/commons/f/f1/Kusatsu-Shiranesan01s5s4272.jpg') center/cover; filter:blur(18px); opacity:0.35; z-index:0; }
#bg-wrap { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:1; }
#bg-wrap img { max-width:100%; max-height:100%; object-fit:contain; }
#overlay { position:absolute; bottom:0; left:0; right:0; padding:50px 20px 14px; background:linear-gradient(transparent,rgba(0,0,0,0.88)); color:white; z-index:2; }
#title { font-size:20px; font-weight:bold; margin-bottom:4px; }
#desc { font-size:13px; opacity:0.85; line-height:1.7; margin-bottom:6px; }
#trivia { font-size:13px; opacity:1; line-height:1.6; border-top:0.5px solid rgba(255,255,255,0.8); padding-top:6px; margin-top:4px; }
</style>
</head>
<body>
<div id="bg-blur"></div>
<div id="bg-wrap"><img src="https://upload.wikimedia.org/wikipedia/commons/f/f1/Kusatsu-Shiranesan01s5s4272.jpg"></div>
<div id="overlay">
  <div id="title">草津白根山の湯釜、群馬県吾妻郡草津町</div>
  <div id="desc">草津白根山の湯釜、群馬県吾妻郡草津町</div>
  <div id="trivia">草津白根山（くさつ しらねさん）は、日本の北関東、群馬県吾妻郡草津町に所在する山。複数の火砕丘からなる複合火砕丘である。正式名称は白根山であるが、他の白根山と区別する必要のある場合の名称として地域名「草津」を冠した草津白根山の名で呼ばれる。標高は2,160メートル。
一般的には観光地となっている湯釜、水釜、涸釜が位置する山を指すが、火山（活火山）としての草津白根山（草津白根火山）には南の逢ノ峰と本白根山を含む。この場合は標高2,171メートルの本白根山が最高峰となる。</div>
</div>
</body>
</html>
