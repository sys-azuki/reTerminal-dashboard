<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:800px; height:480px; overflow:hidden; background:#111; font-family:sans-serif; }
img#bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
#overlay { position:absolute; bottom:0; left:0; right:0; padding:60px 20px 16px; background:linear-gradient(transparent,rgba(0,0,0,0.85)); color:white; }
#title { font-size:22px; font-weight:bold; margin-bottom:4px; }
#artist { font-size:13px; opacity:0.75; margin-bottom:8px; }
#desc { font-size:11px; opacity:0.7; line-height:1.6; }
#date { position:absolute; top:12px; right:16px; color:white; font-size:11px; opacity:0.7; }
</style>
</head>
<body>
<img id="bg" src="">
<div id="date"></div>
<div id="overlay">
  <div id="title">読み込み中...</div>
  <div id="artist"></div>
  <div id="desc"></div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function() {
  const d = new Date();
  document.getElementById('date').textContent =
    d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');

  const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

  const step1 = `https://en.wikipedia.org/w/api.php?action=query&format=json&formatversion=2&prop=images&titles=Template:POTD_protected/${dateStr}&origin=*`;

  fetch(step1)
    .then(r=>r.json())
    .then(data=>{
      const filename = data.query.pages[0].images[0].title;
      const step2 = `https://en.wikipedia.org/w/api.php?action=query&format=json&prop=imageinfo&iiprop=url%7Cdescription%7Cuser&titles=${encodeURIComponent(filename)}&origin=*`;

      return fetch(step2).then(r=>r.json()).then(data2=>{
        const pages = data2.query.pages;
        const page = Object.values(pages)[0];
        const info = page.imageinfo[0];

        document.getElementById('bg').src = info.url;
        document.getElementById('title').textContent =
          filename.replace('File:','').replace(/\.[^.]+$/,'');
        document.getElementById('artist').textContent = info.user || '';

        const rawDesc = (info.description || '').replace(/<[^>]*>/g,'').trim();

        const transUrl = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ja&dt=t&q=${encodeURIComponent(rawDesc)}`;

        fetch(transUrl)
          .then(r=>r.json())
          .then(transData=>{
            const translated = transData[0].map(s=>s[0]).join('');
            document.getElementById('desc').textContent = translated;
          })
          .catch(()=>{
            document.getElementById('desc').textContent = rawDesc;
          });
      });
    })
    .catch(()=>{
      document.getElementById('title').textContent = '取得エラー';
    });
});
</script>
</body>
</html>
