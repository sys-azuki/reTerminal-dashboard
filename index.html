<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:800px; height:480px; overflow:hidden; background:#111; font-family:sans-serif; }
#bg-blur { position:absolute; inset:0; background:url('https://upload.wikimedia.org/wikipedia/commons/3/3a/%D0%9A%D1%8B%D0%B7%D1%8B%D0%BB%D0%BA%D1%83%D0%BF_%D0%BD%D0%B0_%D1%80%D0%B0%D1%81%D1%81%D0%B2%D0%B5%D1%82%D0%B5.jpg') center/cover; filter:blur(18px); opacity:0.35; z-index:0; }
#bg-wrap { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:1; }
#bg-wrap img { max-width:100%; max-height:100%; object-fit:contain; }
#overlay { position:absolute; bottom:0; left:0; right:0; padding:50px 20px 14px; background:linear-gradient(transparent,rgba(0,0,0,0.88)); color:white; z-index:2; }
#title { font-size:20px; font-weight:bold; margin-bottom:4px; }
#artist { font-size:12px; opacity:0.75; margin-bottom:6px; }
#desc { font-size:13px; opacity:0.85; line-height:1.7; margin-bottom:6px; }
#trivia-label { font-size:10px; opacity:1; margin-bottom:2px; letter-spacing:0.08em; }
#trivia { font-size:11px; opacity:1; line-height:1.6; border-top:0.5px solid rgba(255,255,255,0.8); padding-top:6px; margin-top:4px; }
</style>
</head>
<body>
<div id="bg-blur"></div>
<div id="bg-wrap"><img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/%D0%9A%D1%8B%D0%B7%D1%8B%D0%BB%D0%BA%D1%83%D0%BF_%D0%BD%D0%B0_%D1%80%D0%B0%D1%81%D1%81%D0%B2%D0%B5%D1%82%D0%B5.jpg"></div>
<div id="overlay">
  <div id="title">赤ではありません</div>
  <div id="artist">Максат79</div>
  <div id="desc">Kyzylkup table mountain. Kyzylsai regional park, Mangystau District, Mangystau Region, Kazakhstan</div>
  
</div>
</body>
</html>
